openapi: 3.0.0
info:
  version: "1.0.0"
  title: "Gestion d'oeuvre sociale"
  description: "API documentation"
servers:
  - url: "http://localhost:3000/api/v1"
    variables: {}
schemes:
  - "http"
consumes:
  - "application/json"
produces:
  - "application/json"
paths:
  /auth/register:
    post:
      tags:
        - "Authentication"
      summary: "Registers a new user"
      parameters:
        - in: "body"
          name: "body"
          description: "User object"
          required: true
          schema:
            type: "object"
            properties:
              name:
                type: "string"
                minLength: 3
                maxLength: 50
                example: "John Doe"
              email:
                type: "string"
                format: "email"
                example: "johndoe@example.com"
              password:
                type: "string"
                minLength: 6
                example: "password123"
      responses:
        201:
          description: "User registered successfully"
          schema:
            type: "object"
            properties:
              _id:
                type: "string"
                example: "613f7b11a24bb031683a1c2f"
              name:
                type: "string"
                example: "John Doe"
              email:
                type: "string"
                example: "johndoe@example.com"
              role:
                type: "string"
                enum:
                  - "admin"
                  - "user"
                example: "user"
        400:
          description: "Bad request"
          schema:
            $ref: "#/components/schemas/BadRequestError"
  /auth/login:
    post:
      tags:
        - "Authentication"
      summary: "Logs in a user"
      parameters:
        - in: "body"
          name: "body"
          description: "User credentials"
          required: true
          schema:
            type: "object"
            properties:
              email:
                type: "string"
                format: "email"
                example: "johndoe@example.com"
              password:
                type: "string"
                example: "password123"
      responses:
        200:
          description: "User logged in successfully"
          schema:
            type: "object"
            properties:
              user:
                type: "object"
                properties:
                  _id:
                    type: "string"
                    example: "613f7b11a24bb031683a1c2f"
                  name:
                    type: "string"
                    example: "John Doe"
                  email:
                    type: "string"
                    example: "johndoe@example.com"
                  role:
                    type: "string"
                    enum:
                      - "admin"
                      - "user"
                    example: "user"
              accessToken:
                type: "string"
                example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
              refreshToken:
                type: "string"
                example: "c431d12c7cbe68e1988a7eb6dbf2076e5d6a5b6f"
        400:
          description: "Bad request"
          schema:
            $ref: "#/components/schemas/BadRequest"
        401:
          description: "Unauthorized"
          schema:
            $ref: "#/components/schemas/Unauthenticated"
  /auth/logout:
    delete:
      tags:
        - "Authentication"


        
  /emp:
    post:
      tags:
      - "Demandes"
      summary: "Create a new demande"
      description: "Creates a new demande for the authenticated user."
      parameters:
        - name: "body"
          in: "body"
          required: true
          schema:
            $ref: "#/definitions/Demande"
      responses:
        "201":
          description: "The created demande"
          schema:
            $ref: "#/definitions/Demande"
        "401":
          description: "Unauthorized"
          schema:
            $ref: "#/components/schemas/Unauthenticated"
    get:
      tags:
      - "Demandes"
      summary: "Get my demandes"
      description: "Gets all the demandes created by the authenticated user."
      responses:
        "200":
          description: "The list of demandes created by the authenticated user."
          schema:
            type: "array"
            items:
              $ref: "#/definitions/Demande"
        "401":
            description: "Unauthorized"
            schema:
              $ref: "#/components/schemas/Unauthenticated"
  /emp/{id}:
    get:
      tags:
      - "Demandes"
      summary: "Get a single demande"
      description: "Gets the specified demande for the authenticated user."
      parameters:
        - name: "id"
          in: "path"
          description: "ID of the demande to get"
          required: true
          type: "string"
      responses:
        "200":
          description: "The requested demande"
          schema:
            $ref: "#/definitions/Demande"
        "401":
          description: "Unauthorized"
          schema:
            $ref: "#/components/schemas/Unauthenticated"
        "404":
          description: "Demande not found"
          schema:
            $ref: "#/components/schemas/NotFound"
    patch:
      tags:
      - "Demandes"
      summary: "Update a single demande"
      description: "Updates the specified demande for the authenticated user."
      parameters:
        - name: "id"
          in: "path"
          description: "ID of the demande to update"
          required: true
          type: "string"
        - name: "body"
          in: "body"
          required: true
          schema:
            $ref: "#/definitions/Demande"
      responses:
        "200":
          description: "The updated demande"
          schema:
            $ref: "#/definitions/Demande"
        "401":
          description: "Unauthorized"
          schema:
            $ref: "#/components/Unauthenticated"
        "404":
          description: "Demande not found"
          schema:
            $ref: "#/components/NotFound"
  /admin:
    get:
      tags:
      - "Demandes"
      summary: "Get all demandes"
      description: "Gets all demandes for the authenticated admin user."
      responses:
        "200":
          description: "The list of demandes"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/Demande"
        "401":
          description: "Unauthorized"
          schema:
            $ref: "#/components/Unauthenticated"
  /admin/{id}:
    get:
      tags:
      - "Demandes"
      summary: "Get a single demande"
      description: "Gets the specified demande for the authenticated admin user."
      parameters:
        - name: "id"
          in: "path"
          description: "ID of the demande to get"
          required: true
          type: "string"
      responses:
        "200":
          description: "The requested demande"
          schema:
            $ref: "#/definitions/Demande"
        "401":
          description: "Unauthorized"
          schema:
            $ref: "#/components/Unauthenticated"
        "404":
          description: "Demande not found"
          schema:
            $ref: "#/components/NotFound"
    patch:
      tags:
      - "Demandes"
      summary: "Update a single demande"
      description: "Updates the specified demande for the authenticated admin user."
      parameters:
        - name: "id"
          in: "path"
          description: "ID of the demande to update"
          required: true
          type: "string"
        - name: "demande"
          in: "body"
          description: "Demande object that needs to be updated"
          required: true
          schema:
            $ref: "#/definitions/Demande"
      responses:
        "200":
          description: "Demande updated successfully"
          schema:
            $ref: "#/definitions/Demande"
        "401":
            description: "Unauthorized"
            schema:
              $ref: "#/components/Unauthenticated"
        "404":
          description: "Demande not found"
          schema:
            $ref: "#/components/NotFound"
  


  /emp/getAllAnnonce/:
