          schema:
            $ref: "#/components/schemas/Unauthenticated"
        "404":
          description: "Annonce not found"
          schema:
            $ref: "#/components/schemas/NotFound" 

components:
  schemas:
    BadRequestError:
      type: object
      properties:
        message:
          type: string
          description: The error message
      example:
        message: Email already exists
    BadRequest:
      type: object
      properties:
        message:
          type: string
          description: Error message
      example:
        message: Please provide email and password
    Unauthenticated:
      type: object
      properties:
        message:
          type: string
          description: Error message
      example:
        message: Invalid Credentials
    NotFound:
      type: object
      properties:
        message:
          type: string
          description: Error message
      example:
        message: The requested resource was not found
definitions:
    Demande:
      type: "object"
      properties:
        id:
          type: "string"
          readOnly: true
        user:
          type: "string"
        status:
          type: "string"
          enum:
            - "pending"
            - "rejected"
            - "accepted"
            - "paied"
        description:
          type: "string"
        montant:
          type: "number"
        files:
          type: "array"
          items:
            type: "string"
      required:
        - user
        - status
        - montant

    Annonce:
      type: "object"
      properties:
        description:
          type: "string"
        deadline:
          type: "string"
          format: "date"
        emplInscrit:
          type: "array"
          items:
            type: "string"
            format: "uuid"
        emplAdmis:
          type: "array"
          items:
            type: "string"
            format: "uuid"
        createdAt:
          type: "string"
          format: "date-time"
        updatedAt:
          type: "string"
          format: "date-time"
      required:
        - description
        - deadline
    User:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum:
            - admin
            - user
          default: user
      example:
        name: John Doe
        email: john.doe@example.com
        password: password123
        role: user