      parameters:
        - name: "id"
          in: "path"
          description: "ID of the annonce to Desubscribe"
          required: true
          type: "string"
      responses:
        "200":
          description: "The annonce desubscribed"
          schema:
            $ref: "#/definitions/Annonce"
